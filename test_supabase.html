<!DOCTYPE html>
<html><head><title>Test Supabase</title></head>
<body style="font-family:monospace;padding:40px;background:#111;color:#0f0">
<h2>Test Supabase - MetoGroup</h2>
<div id="log" style="white-space:pre-wrap"></div>
<script>
const URL='https://smcghyecpzzimadtuern.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtY2doeWVjcHp6aW1hZHR1ZXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODYwMTksImV4cCI6MjA4Nzk2MjAxOX0.u9OgCRMPFnuNLq4UinR1idpRykVF_VKPwIvFXgttVOw';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
const log=document.getElementById('log');
function p(t){log.textContent+=t+'\n';console.log(t);}

async function test(){
  p('1. Leyendo usuarios...');
  try{
    const r1=await fetch(URL+'/rest/v1/usuarios?select=*',{headers:H});
    p('   Status: '+r1.status+' '+r1.statusText);
    const d1=await r1.text();
    p('   Response: '+d1);
  }catch(e){p('   ERROR: '+e.message);}

  p('\n2. Insertando usuario test...');
  try{
    const body={nombre:'Test User',usuario:'testuser',password:'test123',email:'test@test.com',rol:'vendedor',roles:'["vendedor"]',activo:true};
    const r2=await fetch(URL+'/rest/v1/usuarios',{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});
    p('   Status: '+r2.status+' '+r2.statusText);
    const d2=await r2.text();
    p('   Response: '+d2);
  }catch(e){p('   ERROR: '+e.message);}

  p('\n3. Leyendo usuarios de nuevo...');
  try{
    const r3=await fetch(URL+'/rest/v1/usuarios?select=*',{headers:H});
    p('   Status: '+r3.status+' '+r3.statusText);
    const d3=await r3.text();
    p('   Response: '+d3);
  }catch(e){p('   ERROR: '+e.message);}

  p('\n4. Borrando usuario test...');
  try{
    const r4=await fetch(URL+'/rest/v1/usuarios?usuario=eq.testuser',{method:'DELETE',headers:{...H,'Prefer':'return=representation'}});
    p('   Status: '+r4.status+' '+r4.statusText);
    const d4=await r4.text();
    p('   Response: '+d4);
  }catch(e){p('   ERROR: '+e.message);}

  p('\n✅ Test completo');
}
test();
</script>
</body></html>
